version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    environment:
      - DATABASE_NAME=${DATABASE_NAME}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - APP_NAME=${APP_NAME}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - FRONTEND_URL=http://${VPS_IP_OR_DOMAIN}
      - VITE_API_URL=http://${VPS_IP_OR_DOMAIN}/api
      - VITE_CHATWOOT_URL=http://${VPS_IP_OR_DOMAIN}:3100
    restart: unless-stopped
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=adminpassword
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
